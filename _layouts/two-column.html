---
layout: default
---

<article>
    <h1>{{ page.title }}</h1>


    <div class="two-column-grid">
      <div>
        {{ content }}
      </div>
      <div>
        {% if page.image %}
        <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" style="width: 100%; border: 1px solid var(--border);">
        {% endif %}
      </div>
    </div>    

</article>
